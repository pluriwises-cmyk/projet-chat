<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projets - Direction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <script src="/js/api.js"></script>
</head>

<body>
    <nav class="navbar-custom" style="background: #2c3e50;">
        <div class="container-fluid px-4">
            <span class="navbar-brand"><i class="fas fa-project-diagram"></i> Projets</span>
            <button class="btn btn-light btn-sm"
                onclick="window.location.href='../dashboard-direction.html'">Retour</button>
        </div>
    </nav>

    <div class="container-fluid px-4 py-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>Projets en cours</h2>
            <button class="btn btn-primary" onclick="window.location.href='/ajout-projet.html'">
                <i class="fas fa-plus"></i> Nouveau projet
            </button>
        </div>

        <div id="projetsList" class="loading-container mt-4">
            <div class="loading-spinner"></div>
            <p>Chargement des projets...</p>
        </div>
    </div>

    <script>
        (async function () {
            try {
                const projets = await API.get('/projets');
                const container = document.getElementById('projetsList');
                if (projets.length) {
                    container.innerHTML = projets.map(p => `
                        <div class="consultation-card mb-2">
                            <strong>${p.nom}</strong><br>
                            ${p.description}<br>
                            Budget : ${p.budget.toLocaleString()} DA<br>
                            Avancement : ${p.avancement}%<br>
                            <span class="badge-custom badge-${p.statut === 'en_cours' ? 'info' : 'warning'}">${p.statut}</span>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<p class="text-muted">Aucun projet trouvé.</p>';
                }
            } catch (e) {
                document.getElementById('projetsList').innerHTML = '<p class="text-danger">Erreur chargement.</p>';
            }
        })();
    </script>
</body>

</html>
