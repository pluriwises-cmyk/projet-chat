<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finances - Direction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <script src="/js/api.js"></script>
</head>

<body>
    <nav class="navbar-custom" style="background: #2c3e50;">
        <div class="container-fluid px-4">
            <span class="navbar-brand"><i class="fas fa-chart-line"></i> Finances</span>
            <button class="btn btn-light btn-sm"
                onclick="window.location.href='../dashboard-direction.html'">Retour</button>
        </div>
    </nav>

    <div class="container-fluid px-4 py-4">
        <h2>Tableau de bord financier</h2>
        <div id="facturesList" class="loading-container mt-4">
            <div class="loading-spinner"></div>
            <p>Chargement des factures...</p>
        </div>
    </div>

    <script>
        (async function () {
            try {
                const factures = await API.get('/factures');
                const container = document.getElementById('facturesList');
                if (factures.length) {
                    container.innerHTML = factures.map(f => `
                    <div class="consultation-card mb-2">
                    <strong>${f.nom} ${f.prenom}</strong><br>
                    Montant : ${f.montant_ttc} DA<br>
                    Statut : <span class="badge-custom badge-${f.statut === 'payee' ? 'success' : f.statut === 'emise' ? 'warning' : 'danger'}">${f.statut}</span>
                    </div>
                `).join('');
                } else {
                    container.innerHTML = '<p class="text-muted">Aucune facture trouvée.</p>';
                }
            } catch (e) {
                document.getElementById('facturesList').innerHTML = '<p class="text-danger">Erreur chargement.</p>';
            }
        })();
    </script>
</body>

</html>
