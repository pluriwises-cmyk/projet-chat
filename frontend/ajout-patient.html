<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajouter un patient</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="/js/api.js"></script>
</head>

<body>
    <nav class="navbar-custom" style="background: #3498db;">
        <div class="container-fluid px-4">
            <span class="navbar-brand"><i class="fas fa-user-plus"></i> Nouveau patient</span>
            <button class="btn btn-light btn-sm" onclick="window.location.href='index.html'">Accueil</button>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="card-custom">
            <h2>Ajouter un patient</h2>
            <form id="patientForm">
                <div class="mb-3">
                    <label>Nom</label>
                    <input type="text" class="form-control" id="nom" required>
                </div>
                <div class="mb-3">
                    <label>Prénom</label>
                    <input type="text" class="form-control" id="prenom" required>
                </div>
                <div class="mb-3">
                    <label>Téléphone</label>
                    <input type="text" class="form-control" id="telephone">
                </div>
                <div class="mb-3">
                    <label>Email</label>
                    <input type="email" class="form-control" id="email">
                </div>
                <div class="mb-3">
                    <label>Adresse</label>
                    <input type="text" class="form-control" id="adresse">
                </div>
                <button type="submit" class="btn btn-primary">Enregistrer</button>
            </form>
            <div id="message" class="mt-3"></div>
        </div>
    </div>

    <script>
        document.getElementById('patientForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                nom: document.getElementById('nom').value,
                prenom: document.getElementById('prenom').value,
                telephone: document.getElementById('telephone').value,
                email: document.getElementById('email').value,
                adresse: document.getElementById('adresse').value
            };
            try {
                const result = await API.post('/beneficiaires', data);
                document.getElementById('message').innerHTML = `<div class="alert alert-success">Patient ajouté (ID ${result.id})</div>`;
                document.getElementById('patientForm').reset();
            } catch (e) {
                document.getElementById('message').innerHTML = '<div class="alert alert-danger">Erreur</div>';
            }
        });
    </script>
</body>

</html>
