<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soins - Infirmier</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/api.js"></script>
</head>

<body>
    <nav class="navbar-custom" style="background: #1abc9c;">
        <div class="container-fluid px-4">
            <span class="navbar-brand"><i class="fas fa-hand-holding-medical"></i> Soins</span>
            <button class="btn btn-light btn-sm"
                onclick="window.location.href='../dashboard-infirmier.html'">Retour</button>
        </div>
    </nav>

    <div class="container-fluid px-4 py-4">
        <h2>Soins programmés</h2>
        <div id="soinsList" class="loading-container mt-4">
            <div class="loading-spinner"></div>
            <p>Chargement...</p>
        </div>
    </div>

    <script>
        (async function () {
            try {
                const soins = await API.get('/soins');
                const container = document.getElementById('soinsList');
                container.innerHTML = soins.map(s => `
                <div class="consultation-card mb-2" style="border-left-color: ${s.urgent ? '#e74c3c' : '#1abc9c'};">
                <strong>${s.nom} ${s.prenom}</strong><br>
                Soin : ${s.type_soin}<br>
                Date : ${s.date_soin}<br>
                <span class="badge-custom badge-${s.urgent ? 'danger' : 'info'}">${s.urgent ? 'Urgent' : 'Programmé'}</span>
                </div>
            `).join('');
            } catch (e) {
                container.innerHTML = '<p class="text-danger">Erreur chargement.</p>';
            }
        })();
    </script>
</body>

</html>
