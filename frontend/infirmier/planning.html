<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planning - Infirmier</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/api.js"></script>
</head>

<body>
    <nav class="navbar-custom" style="background: #1abc9c;">
        <div class="container-fluid px-4">
            <span class="navbar-brand"><i class="fas fa-calendar-alt"></i> Planning</span>
            <button class="btn btn-light btn-sm"
                onclick="window.location.href='../dashboard-infirmier.html'">Retour</button>
        </div>
    </nav>

    <div class="container-fluid px-4 py-4">
        <h2>Planning du personnel</h2>
        <div id="planningList" class="loading-container mt-4">
            <div class="loading-spinner"></div>
            <p>Chargement...</p>
        </div>
    </div>

    <script>
        (async function () {
            try {
                const planning = await API.get('/planning');
                const container = document.getElementById('planningList');
                container.innerHTML = planning.map(p => `
                    <div class="consultation-card mb-2">
                        <strong>${p.nom} ${p.prenom}</strong><br>
                        Date : ${p.date} | ${p.heure_debut} – ${p.heure_fin}<br>
                        Affectation : ${p.affectation}
                    </div>
                `).join('');
            } catch (e) {
                container.innerHTML = '<p class="text-danger">Erreur chargement.</p>';
            }
        })();
    </script>
</body>

</html>
