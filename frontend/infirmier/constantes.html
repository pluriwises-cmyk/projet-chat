<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Constantes - Infirmier</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/api.js"></script>
</head>

<body>
    <nav class="navbar-custom" style="background: #1abc9c;">
        <div class="container-fluid px-4">
            <span class="navbar-brand"><i class="fas fa-heartbeat"></i> Constantes</span>
            <button class="btn btn-light btn-sm"
                onclick="window.location.href='../dashboard-infirmier.html'">Retour</button>
        </div>
    </nav>

    <div class="container-fluid px-4 py-4">
        <h2>Patients sous surveillance</h2>
        <div id="constantesList" class="loading-container mt-4">
            <div class="loading-spinner"></div>
            <p>Chargement...</p>
        </div>
    </div>

    <script>
        (async function () {
            try {
                const constantes = await API.get('/constantes');
                const container = document.getElementById('constantesList');
                if (constantes.length) {
                    container.innerHTML = constantes.map(c => `
                        <div class="consultation-card mb-2" style="border-left-color: #1abc9c;">
                            <strong>${c.nom || '?'} ${c.prenom || '?'}</strong> – Chambre ${c.chambre || '?'}<br>
                            TA: ${c.tension || '?'} | Pouls: ${c.pouls || '?'} | Temp: ${c.temperature || '?'}°C | Sat: ${c.saturation || '?'}%
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<p class="text-muted">Aucune constante trouvée.</p>';
                }
            } catch (e) {
                document.getElementById('constantesList').innerHTML = '<p class="text-danger">Erreur chargement.</p>';
            }
        })();
    </script>
</body>

</html>
