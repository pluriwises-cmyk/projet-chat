<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Hôpital Saint-Jean</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="/js/api.js"></script>
</head>

<body>
    <nav class="navbar-custom" style="background: linear-gradient(135deg, #8e44ad, #9b59b6);">
        <div class="container-fluid px-4">
            <span class="navbar-brand"><i class="fas fa-chart-bar"></i> Espace Administratif</span>
            <div>
                <span class="text-white me-3">Admin</span>
                <button class="btn btn-light btn-sm" onclick="API.logout()">Déconnexion</button>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-4 py-4 fade-in">
        <h2 class="mb-4">Tableau de bord administratif</h2>

        <div class="quick-actions-grid">
            <div class="quick-action-card" onclick="window.location.href='admin/admissions.html'"><i
                    class="fas fa-user-plus"></i><span>Admissions</span></div>
            <div class="quick-action-card" onclick="window.location.href='admin/facturation.html'"><i
                    class="fas fa-file-invoice"></i><span>Facturation</span></div>
            <div class="quick-action-card" onclick="window.location.href='admin/dossiers.html'"><i
                    class="fas fa-folder-open"></i><span>Dossiers</span></div>
            <div class="quick-action-card" onclick="window.location.href='admin/rendezvous.html'"><i
                    class="fas fa-calendar-check"></i><span>Rendez-vous</span></div>
            <div class="quick-action-card" onclick="window.location.href='personnel.html'"><i
                    class="fas fa-users"></i><span>Personnel</span></div>
            <div class="quick-action-card" onclick="window.location.href='ajout-patient.html'">
                <i class="fas fa-user-plus"></i>
                <span>Nouveau patient</span>
            </div>
            <div class="quick-action-card" onclick="window.location.href='ajout-admission.html'">
                <i class="fas fa-user-plus"></i>
                <span>Nouvelle admission</span>
            </div>
        </div>

        <div class="row mb-4" id="statsRow"></div>

        <div class="card-custom">
            <div class="card-header-custom">
                <h5><i class="fas fa-file-invoice me-2" style="color:#e74c3c;"></i>Factures en attente</h5>
            </div>
            <div id="facturesContainer" class="loading-container">
                <div class="loading-spinner"></div>
                <p>Chargement...</p>
            </div>
        </div>
    </div>

    <script>
        (async function () {
    try {
        // 1. Récupérer les vraies statistiques
        const stats = await API.getStats();

        // 2. Récupérer les vraies factures (avec jointure)
        const factures = await API.getFactures();

        // Affichage des stats
        document.getElementById('statsRow').innerHTML = `
            <div class="col-md-3"><div class="stat-card"><div class="stat-value">${stats.admissions_jour || 0}</div><div class="stat-label">Admissions</div></div></div>
            <div class="col-md-3"><div class="stat-card" style="border-left-color:#f39c12;"><div class="stat-value">${stats.rdv_attente || 0}</div><div class="stat-label">RDV en attente</div></div></div>
            <div class="col-md-3"><div class="stat-card" style="border-left-color:#e74c3c;"><div class="stat-value">${stats.factures_impayees || 0}</div><div class="stat-label">Factures</div></div></div>
            <div class="col-md-3"><div class="stat-card" style="border-left-color:#27ae60;"><div class="stat-value">${stats.personnel_actif || 28}</div><div class="stat-label">Personnel</div></div></div>
        `;

        // Affichage des factures
        const container = document.getElementById('facturesContainer');
        if (factures && factures.length) {
            container.innerHTML = factures.map(f => `
                <div class="consultation-card" style="border-left-color:#e74c3c;">
                    <strong>Facture #${f.id_facture}</strong> – ${f.nom} ${f.prenom}<br>
                    <span class="text-muted">Montant : ${f.montant_ttc || f.montant} DA</span><br>
                    <span class="badge-custom badge-${f.statut === 'payee' ? 'success' : 'warning'}">${f.statut}</span>
                </div>
            `).join('');
        } else {
            container.innerHTML = '<p class="text-muted text-center">Aucune facture trouvée</p>';
        }

    } catch (e) {
        console.error('Erreur chargement admin :', e);
    }
})();
    </script>
</body>

</html>
