<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qualité - Hôpital Saint-Jean</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="/js/api.js"></script>
</head>

<body>
    <nav class="navbar-custom" style="background: #f39c12;">
        <div class="container-fluid px-4">
            <span class="navbar-brand"><i class="fas fa-star"></i> Service qualité</span>
            <button class="btn btn-light btn-sm" onclick="window.location.href='index.html'">Accueil</button>
        </div>
    </nav>

    <div class="container-fluid px-4 py-4">
        <h2>Indicateurs qualité</h2>
        <div id="indicateursList" class="loading-container mt-4">
            <div class="loading-spinner"></div>
            <p>Chargement...</p>
        </div>
    </div>

    <script>
        (async function () {
            try {
                const indicateurs = await API.get('/indicateurs-qualite');
                const container = document.getElementById('indicateursList');
                if (indicateurs.length) {
                    container.innerHTML = indicateurs.map(i => `
                        <div class="consultation-card mb-2" style="border-left-color: #f39c12;">
                            <strong>${i.nom}</strong><br>
                            Valeur : ${i.valeur}<br>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<p class="text-muted">Aucun indicateur trouvé.</p>';
                }
            } catch (e) {
                document.getElementById('indicateursList').innerHTML = '<p class="text-danger">Erreur chargement.</p>';
            }
        })();
    </script>
</body>

</html>
