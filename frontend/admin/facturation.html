<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facturation - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/api.js"></script>
</head>

<body>
    <nav class="navbar-custom" style="background: #8e44ad;">
        <div class="container-fluid px-4">
            <span class="navbar-brand"><i class="fas fa-file-invoice"></i> Facturation</span>
            <button class="btn btn-light btn-sm"
                onclick="window.location.href='../dashboard-admin.html'">Retour</button>
        </div>
    </nav>

    <div class="container-fluid px-4 py-4">
        <h2>Factures en attente</h2>
        <div id="facturesList" class="loading-container mt-4">
            <div class="loading-spinner"></div>
            <p>Chargement...</p>
        </div>
    </div>

    <script>
        (async function () {
            try {
                const factures = [
                    { numero: "FAC-001", patient: "Mamadou Diop", montant: "49 500", statut: "payée" },
                    { numero: "FAC-002", patient: "Aminata Fall", montant: "27 500", statut: "en attente" },
                    { numero: "FAC-003", patient: "Ousmane Sow", montant: "137 500", statut: "impayée" },
                ];
                const container = document.getElementById('facturesList');
                container.innerHTML = factures.map(f => `
                <div class="consultation-card mb-2" style="border-left-color: #e74c3c;">
                <strong>${f.numero}</strong> – ${f.patient}<br>
                ${f.montant} DA<br>
                <span class="badge-custom badge-${f.statut === 'payée' ? 'success' : f.statut === 'en attente' ? 'warning' : 'danger'}">${f.statut}</span>
                </div>
            `).join('');
            } catch (e) {
                document.getElementById('facturesList').innerHTML = '<p class="text-danger">Erreur chargement.</p>';
            }
        })();
    </script>
</body>

</html>
