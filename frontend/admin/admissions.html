<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admissions - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/api.js"></script>
</head>

<body>
    <nav class="navbar-custom" style="background: #8e44ad;">
        <div class="container-fluid px-4">
            <span class="navbar-brand"><i class="fas fa-user-plus"></i> Admissions</span>
            <button class="btn btn-light btn-sm"
                onclick="window.location.href='../dashboard-admin.html'">Retour</button>
        </div>
    </nav>

    <div class="container-fluid px-4 py-4">
        <h2>Liste des admissions</h2>
        <div id="admissionsList" class="loading-container mt-4">
            <div class="loading-spinner"></div>
            <p>Chargement...</p>
        </div>
    </div>

    <script>
        (async function () {
            try {
                const admissions = await API.get('/admissions');
                const container = document.getElementById('admissionsList');
                container.innerHTML = admissions.map(a => `
                    <div class="consultation-card mb-2" style="border-left-color: #8e44ad;">
                        <strong>${a.nom} ${a.prenom}</strong><br>
                        Service : ${a.service} – Médecin : ${a.medecin}<br>
                        Date : ${a.date_admission}<br>
                        <span class="badge-custom badge-${a.statut === 'termine' ? 'success' : a.statut === 'en_attente' ? 'warning' : 'info'}">${a.statut}</span>
                    </div>
                `).join('');
            } catch (e) {
                container.innerHTML = '<p class="text-danger">Erreur chargement.</p>';
            }
        })();
    </script>
</body>

</html>
