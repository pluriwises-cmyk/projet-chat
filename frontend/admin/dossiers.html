<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dossiers patients - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/api.js"></script>
</head>

<body>
    <nav class="navbar-custom" style="background: #8e44ad;">
        <div class="container-fluid px-4">
            <span class="navbar-brand"><i class="fas fa-folder-open"></i> Dossiers patients</span>
            <button class="btn btn-light btn-sm"
                onclick="window.location.href='../dashboard-admin.html'">Retour</button>
        </div>
    </nav>

    <div class="container-fluid px-4 py-4">
        <h2>Liste des dossiers médicaux</h2>
        <div id="dossiersList" class="loading-container mt-4">
            <div class="loading-spinner"></div>
            <p>Chargement...</p>
        </div>
    </div>

    <script>
        (async function () {
            try {
                const dossiers = await API.get('/dossiers-medicaux');
                const container = document.getElementById('dossiersList');
                container.innerHTML = dossiers.map(d => `
                    <div class="consultation-card mb-2" style="border-left-color: #8e44ad;">
                        <strong>${d.nom} ${d.prenom}</strong><br>
                        Groupe : ${d.groupe_sanguin || '?'}<br>
                        Allergies : ${d.allergies || 'aucune'}<br>
                        Médecin traitant : ${d.medecin_traitant || '?'}
                    </div>
                `).join('');
            } catch (e) {
                container.innerHTML = '<p class="text-danger">Erreur chargement.</p>';
            }
        })();
    </script>
</body>

</html>
