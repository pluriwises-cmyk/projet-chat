<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Médecin - CHAT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/api.js"></script>
</head>

<body>
    <nav class="navbar-custom" style="background: linear-gradient(135deg, #2c3e50, #3498db);">
        <div class="container-fluid px-4">
            <span class="navbar-brand"><i class="fas fa-user-md"></i> Espace Médecin</span>
            <div>
                <span class="text-white me-3" id="doctorName">Dr. SAID</span>
                <button class="btn btn-light btn-sm" onclick="API.logout()">Déconnexion</button>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-4 py-4 fade-in">
        <h2 class="mb-4">Tableau de bord médical</h2>

        <div class="quick-actions-grid">
            <div class="quick-action-card" onclick="window.location.href='medecin/consultations.html'">
                <i class="fas fa-stethoscope"></i><span>Consultations</span>
            </div>
            <div class="quick-action-card" onclick="window.location.href='medecin/prescriptions.html'">
                <i class="fas fa-prescription"></i><span>Prescriptions</span>
            </div>
            <div class="quick-action-card" onclick="window.location.href='medecin/patients.html'">
                <i class="fas fa-users"></i><span>Patients</span>
            </div>
            <div class="quick-action-card" onclick="window.location.href='medecin/rendezvous.html'">
                <i class="fas fa-calendar-check"></i><span>Rendez-vous</span>
            </div>
            <div class="quick-action-card" onclick="window.location.href='ajout-consultation.html'">
                <i class="fas fa-calendar-plus"></i>
                <span>Nouvelle consultation</span>
            </div>
            <div class="quick-action-card" onclick="window.location.href='ajout-prescription.html'">
                <i class="fas fa-prescription"></i>
                <span>Nouvelle prescription</span>
            </div>
        </div>

        <div class="row mb-4" id="statsRow"></div>

        <div class="card-custom">
            <div class="card-header-custom">
                <h5><i class="fas fa-history me-2" style="color: #3498db;"></i>Dernières consultations</h5>
            </div>
            <div id="consultationsContainer" class="loading-container">
                <div class="loading-spinner"></div>
                <p>Chargement des consultations...</p>
            </div>
        </div>

        <div class="card-custom">
            <div class="card-header-custom">
                <h5><i class="fas fa-calendar-alt me-2" style="color: #f39c12;"></i>Prochains rendez-vous</h5>
            </div>
            <div id="rdvContainer" class="loading-container">
                <div class="loading-spinner"></div>
                <p>Chargement des rendez-vous...</p>
            </div>
        </div>
    </div>

    <script>
        (async function () {
            // ========== VÉRIFICATION DU TOKEN ET DU RÔLE ==========
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'index.html';
                return;
            }

            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                const role = payload.role;

                // Vérification que l'utilisateur a bien le rôle 'medecin'
                if (role !== 'medecin') {
                    alert('Accès non autorisé. Vous n\'avez pas les droits médecin.');
                    window.location.href = 'index.html';
                    return;
                }

                // Si tout est OK, on affiche le nom du médecin (optionnel)
                if (payload.nom && payload.prenom) {
                    document.getElementById('doctorName').textContent = `Dr. ${payload.prenom} ${payload.nom}`;
                }
            } catch (e) {
                console.error('Token invalide', e);
                window.location.href = 'index.html';
                return;
            }

            // ========== CHARGEMENT DES DONNÉES ==========
            try {
                const stats = await API.getStats();
                const consultations = await API.getConsultations();
                const rdvs = await API.getRendezVous();

                // Affichage des stats
                const statsRow = document.getElementById('statsRow');
                statsRow.innerHTML = `
                    <div class="col-md-3">
                        <div class="stat-card"><div class="stat-value">${stats.consultations_jour || 0}</div><div class="stat-label">Consultations</div></div>
                    </div>
                    <div class="col-md-3">
                        <div class="stat-card" style="border-left-color: #27ae60;"><div class="stat-value">${stats.patients_total || 0}</div><div class="stat-label">Patients</div></div>
                    </div>
                    <div class="col-md-3">
                        <div class="stat-card" style="border-left-color: #f39c12;"><div class="stat-value">${stats.rdv_jour || 0}</div><div class="stat-label">Rendez-vous</div></div>
                    </div>
                    <div class="col-md-3">
                        <div class="stat-card" style="border-left-color: #e74c3c;"><div class="stat-value">${stats.rdv_attente || 0}</div><div class="stat-label">En attente</div></div>
                    </div>
                `;

                // Affichage des consultations
                const consContainer = document.getElementById('consultationsContainer');
                if (consultations.length) {
                    consContainer.innerHTML = consultations.map(c => `
                        <div class="consultation-card">
                            <div><strong>${new Date(c.date_heure).toLocaleString()}</strong></div>
                            <div>Patient : ${c.patientNom || '?'} ${c.patientPrenom || '?'}</div>
                            <div class="text-muted">Motif : ${c.motif || 'Non précisé'}</div>
                            <span class="badge-custom badge-${c.statut === 'realisee' ? 'success' : 'warning'}">${c.statut}</span>
                        </div>
                    `).join('');
                } else {
                    consContainer.innerHTML = '<p class="text-center text-muted">Aucune consultation récente</p>';
                }

                // Affichage des rendez-vous
                const rdvContainer = document.getElementById('rdvContainer');
                if (rdvs.length) {
                    rdvContainer.innerHTML = rdvs.map(r => `
                        <div class="consultation-card">
                            <div><strong>${new Date(r.date_rdv).toLocaleString()}</strong> - ${r.nom} ${r.prenom}</div>
                            <div class="text-muted">Motif : ${r.motif || 'Consultation'}</div>
                            <span class="badge-custom badge-${r.statut === 'confirmé' ? 'success' : 'warning'}">${r.statut}</span>
                        </div>
                    `).join('');
                } else {
                    rdvContainer.innerHTML = '<p class="text-center text-muted">Aucun rendez-vous prévu</p>';
                }

            } catch (e) {
                console.error('Erreur chargement dashboard médecin :', e);
                document.getElementById('consultationsContainer').innerHTML = '<p class="text-danger">Erreur chargement des données</p>';
                document.getElementById('rdvContainer').innerHTML = '<p class="text-danger">Erreur chargement des rendez-vous</p>';
            }
        })();
    </script>
</body>

</html>
