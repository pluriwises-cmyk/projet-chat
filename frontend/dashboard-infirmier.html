<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Infirmier - CHAT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="/js/api.js"></script>
</head>

<body>
    <nav class="navbar-custom" style="background: linear-gradient(135deg, #16a085, #1abc9c);">
        <div class="container-fluid px-4">
            <span class="navbar-brand"><i class="fas fa-user-nurse"></i> Espace Infirmier</span>
            <div>
                <span class="text-white me-3">Inf. Benammar Khaled</span>
                <button class="btn btn-light btn-sm" onclick="API.logout()">Déconnexion</button>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-4 py-4 fade-in">
        <h2 class="mb-4">Tableau de bord infirmier</h2>

        <div class="quick-actions-grid">
            <div class="quick-action-card" onclick="window.location.href='infirmier/constantes.html'">
                <i class="fas fa-heartbeat"></i><span>Constantes</span>
            </div>
            <div class="quick-action-card" onclick="window.location.href='infirmier/soins.html'">
                <i class="fas fa-hand-holding-medical"></i><span>Soins</span>
            </div>
            <div class="quick-action-card" onclick="window.location.href='infirmier/medicaments.html'">
                <i class="fas fa-pills"></i><span>Médicaments</span>
            </div>
            <div class="quick-action-card" onclick="window.location.href='infirmier/planning.html'">
                <i class="fas fa-calendar-alt"></i><span>Planning</span>
            </div>
            <div class="quick-action-card" onclick="window.location.href='ajout-constante.html'">
                <i class="fas fa-heartbeat"></i>
                <span>Nouvelle constante</span>
            </div>
            <div class="quick-action-card" onclick="window.location.href='ajout-soin.html'">
                <i class="fas fa-hand-holding-medical"></i>
                <span>Nouveau soin</span>
            </div>
            <div class="quick-action-card" onclick="window.location.href='ajout-medicament.html'">
                <i class="fas fa-pills"></i>
                <span>Nouveau médicament</span>
            </div>
        </div>

        <div class="row mb-4" id="statsRow">
            <!-- injecté par JS -->
        </div>

        <div class="card-custom">
            <div class="card-header-custom">
                <h5><i class="fas fa-procedures me-2" style="color: #16a085;"></i>Patients sous surveillance</h5>
            </div>
            <div id="patientsContainer" class="loading-container">
                <div class="loading-spinner"></div>
                <p>Chargement...</p>
            </div>
        </div>
    </div>

    <script>
        (async function () {
    try {
        // 1. Récupérer les vraies statistiques
        const stats = await API.getStats();

        // 2. Récupérer les vraies constantes (avec jointure)
        const constantes = await API.getConstantes();

        // Affichage des stats
        document.getElementById('statsRow').innerHTML = `
            <div class="col-md-3"><div class="stat-card"><div class="stat-value">${stats.patients_assignes || 0}</div><div class="stat-label">Assignés</div></div></div>
            <div class="col-md-3"><div class="stat-card" style="border-left-color:#f39c12;"><div class="stat-value">${stats.soins_attente || 0}</div><div class="stat-label">Soins en attente</div></div></div>
            <div class="col-md-3"><div class="stat-card" style="border-left-color:#3498db;"><div class="stat-value">${stats.medicaments_jour || 0}</div><div class="stat-label">Médicaments</div></div></div>
            <div class="col-md-3"><div class="stat-card" style="border-left-color:#27ae60;"><div class="stat-value">${stats.constantes_jour || 0}</div><div class="stat-label">Constantes</div></div></div>
        `;

        // Affichage des constantes
        const container = document.getElementById('patientsContainer');
        if (constantes && constantes.length) {
            container.innerHTML = constantes.map(c => `
                <div class="consultation-card" style="border-left-color: #16a085;">
                    <strong>${c.nom} ${c.prenom}</strong> – Ch. ${c.chambre || '?'}<br>
                    <span class="text-muted">TA: ${c.tension || '?'} | Pouls: ${c.pouls || '?'} | Temp: ${c.temperature || '?'}°C | Sat: ${c.saturation || '?'}%</span>
                </div>
            `).join('');
        } else {
            container.innerHTML = '<p class="text-muted text-center">Aucun patient sous surveillance</p>';
        }

    } catch (e) {
        console.error('Erreur chargement infirmier :', e);
    }
})();
    </script>
</body>

</html>
